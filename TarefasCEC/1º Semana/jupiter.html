<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            JupiterWeb
        </title>
        <style>
            header {
                gap: 2vh;
                margin-bottom: 1vh;
            }

            #img1 {
                margin: 2vh;
            }

            .container  {
                display: flex;
                flex-direction: row;
                margin: 2vh;

		
                
            }

	    .fundo {
		position: fixed;
		background-image: url("uspfundo.png");
                background-size: cover;
		background-position: center;
		filter: blur(8px);
		height: 100%;
		width: 100%;
		z-index: -1;
	    }

            form {
                display: flex;
                flex-direction: column;
                
            }

            a:hover {
                background-color: gray;
		border-radius: 5px;
		
            }

	    a {
		display: inline-block;
		padding: 5px 10px;
		text-decoration: none;
		color: black;
	    }
	    

            #links {
                display: flex;
                flex-direction: column;
                gap: 1vh;
                border: 1px solid gray;
                border-radius: 3px;
                width: 10vw;
                font-size:small; 
                background-color: rgba(256,256,256,0.7);
                text-align: center;
		padding-bottom: 2vh;
            }

            nav {
                display: flex;
                justify-content: center;
                flex-direction: column;
                gap: 5vh;
            }

	    form {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 50vh;
		gap: 1vh;
		
	    }

	    #form-container {
		background-color: rgba(50,50,50,0.7);
		width: 40vw;
		padding-left: 20px;
		margin: 10px auto;
		border-radius: 10px;
		color: white;
	    }

        </style>
    </head>

</html>
