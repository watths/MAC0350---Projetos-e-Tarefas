<p>Curta abaixo</p>

<h1 id="curtidas"> {{ contador }} </h1>

<button hx-post="/curtir"
	hx-trigger="click"
	hx-target="#curtidas"
	hx-swap="innerHTML">
  Curtir
</button>

<button hx-put="/zerar"
	hx-trigger="click"
	hx-target="#curtidas"
	hx-swap="innerHTML"
	hx-confirm="Certeza que deseja zerar as curtidas?">
  Zerar Curtidas
</button>
