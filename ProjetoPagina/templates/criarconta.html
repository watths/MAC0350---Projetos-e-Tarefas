<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USPmail</title>
  <link rel="stylesheet" href="/static/style.css">
  
</head>
<body>
  <div id="container">
    
    <div id="title">
      <img src="/static/icone.png" id="icone"> </img>
      <h1>Crie sua Conta</h1>
    </div>
    
    <div>
      <form>
	<input type="text" id="email" placeholder="E-mail">
	<input type="password" id="senha" placeholder="Senha">
	<input type="password" id="confirma_senha" placeholder="Confirme sua Senha">

	<div id=divisao>
	  <button type="button" id="botao_criarconta" onclick="pagina_login()">Login</button>
	  <button type="button" id="enviar" onclick="criarconta()">Criar Conta</button>
	</div>
	
      </form>
    </div>
  </div>
  
  <script src="/static/script.js"></script>
  
</body>
</html>
